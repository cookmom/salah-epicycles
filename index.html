.dot { width:5px; height:5px; border-radius:50%; background:rgba(200,220,255,0.18); transition:background 0.5s; }
.dot.active { background:rgba(200,220,255,0.85); }

  <span class="arabic" id="arLabel"></span>
  <span class="latin"  id="enLabel"></span>

  { id:'julus', arabic:'جلوس', latin:'Julus — Taslim',
    pts:[[-0.761,0.351],[-0.799,0.288],[-0.824,0.226],[-0.849,0.163],[-0.849,0.1],[-0.824,0.038],[-0.711,-0.025],[-0.497,-0.087],[-0.409,-0.147],[-0.384,-0.209],[-0.182,-0.255],[-0.082,-0.054],[-0.019,-0.051],[0.094,-0.242],[0.082,-0.068],[0.195,-0.203],[0.208,-0.18],[0.182,-0.104],[0.107,0.143],[0.308,0.203],[0.535,0.249],[0.774,0.288],[0.95,0.344],[0.95,0.407],[0.723,0.46],[0.484,0.479],[0.761,0.654],[0.748,0.68],[0.182,0.479],[0.585,0.687],[0.484,0.684],[0.384,0.684],[0.233,0.637],[0.208,0.67],[0.119,0.634],[0.119,0.677],[0.044,0.664],[-0.019,0.693],[-0.119,0.687],[-0.22,0.651],[-0.195,0.473],[-0.396,0.684],[-0.484,0.677],[-0.535,0.677],[-0.522,0.644],[-0.686,0.677],[-0.786,0.687],[-0.736,0.634],[-0.484,0.479],[-0.698,0.463],[-0.937,0.463],[-1.013,0.417],[-0.786,0.384]] },
];

// ── Catmull-Rom spline interpolation for smooth paths ─────────────────────────
function catmullRom(p0, p1, p2, p3, t) {
  const t2=t*t, t3=t2*t;
  return {
    x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function smoothPath(pts, stepsPerSegment) {
  const raw = pts.map(p=>({x:p[0],y:p[1]}));
  const N = raw.length;
  const out = [];
  for (let i=0; i<N; i++) {
    const p0 = raw[(i-1+N)%N], p1=raw[i], p2=raw[(i+1)%N], p3=raw[(i+2)%N];
    for (let s=0; s<stepsPerSegment; s++) {
      out.push(catmullRom(p0,p1,p2,p3,s/stepsPerSegment));
    }
  }
  return out;
}

// ── Resample to N equidistant points ─────────────────────────────────────────
function resample(pts, N) {
  const lens=[0];
  for (let i=1; i<pts.length; i++) {
    const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
    lens.push(lens[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
  const total=lens[lens.length-1];
  const out=[];
  for (let i=0; i<N; i++) {
    const tgt=(i/N)*total;
    let j=0; while(j<lens.length-2&&lens[j+1]<=tgt) j++;
    const t=(tgt-lens[j])/(lens[j+1]-lens[j]+1e-9);
    const a=pts[Math.min(j,pts.length-1)], b=pts[Math.min(j+1,pts.length-1)];
    out.push({x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t});
  }
  return out;
}

// ── DFT ───────────────────────────────────────────────────────────────────────
function dft(signal) {
  const N=signal.length, res=[];
  for (let k=0; k<N; k++) {
    let re=0, im=0;
    for (let n=0; n<N; n++) {
      const phi=TAU*k*n/N;
      re+=signal[n].x*Math.cos(phi)+signal[n].y*Math.sin(phi);
      im+=-signal[n].x*Math.sin(phi)+signal[n].y*Math.cos(phi);
    }
    res.push({freq:k, amp:Math.sqrt(re*re+im*im)/N, phase:Math.atan2(im,re), re:re/N, im:im/N});
  }
  return res.sort((a,b)=>b.amp-a.amp);
}

// ── Precompute ─────────────────────────────────────────────────────────────────
const N_SMOOTH   = 4;   // Catmull-Rom steps per segment
const N_SAMPLES  = 256; // resample count for DFT
const N_EPICYCLES = 50; // top N frequencies to use

const computed = POSES.map(p => {
  const smooth  = smoothPath(p.pts, N_SMOOTH);
  const sampled = resample(smooth, N_SAMPLES);
  const freqs   = dft(sampled).slice(0, N_EPICYCLES);
  // Also store full resampled path for the "complete" overlay
  return {...p, freqs, fullPath: sampled};
});

// ── Progress dots + labels ─────────────────────────────────────────────────────
const progEl=document.getElementById('progress');
POSES.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':''); d.id='dot'+i;
  progEl.appendChild(d);
});
function setLabel(idx) {
  document.getElementById('arLabel').textContent=POSES[idx].arabic;
  document.getElementById('enLabel').textContent=POSES[idx].latin;
  POSES.forEach((_,i)=>document.getElementById('dot'+i).className='dot'+(i===idx?' active':''));
}

// ── Epicycle evaluation ───────────────────────────────────────────────────────
function evalEpicycles(freqs, t) {
  const s=canvas.width, scale=s*0.40, cx=s/2, cy=s/2-10;
  let x=cx, y=cy;
  const arms=[];
  for (const f of freqs) {
    const angle=f.freq*t*TAU+f.phase;
    const nx=x+f.amp*scale*Math.cos(angle);
    const ny=y+f.amp*scale*Math.sin(angle);
    arms.push({x0:x,y0:y,x1:nx,y1:ny,r:f.amp*scale});
    x=nx; y=ny;
  }
  return {tip:{x,y},arms};
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawFrame(pose, t, trail, showArms) {
  const s=canvas.width;
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,s,s);

  const {tip,arms}=evalEpicycles(pose.freqs, t);

  // Epicycle circles + arms (only while drawing)
  if (showArms) {
    for (const a of arms) {
      if (a.r < 1) continue;
      ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
      ctx.strokeStyle='rgba(150,200,255,0.08)'; ctx.lineWidth=0.7; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
      ctx.strokeStyle='rgba(150,200,255,0.30)'; ctx.lineWidth=1.0; ctx.stroke();
    }
  }

  // Trail
  if (trail.length>1) {
    ctx.beginPath();
    ctx.moveTo(trail[0].x,trail[0].y);
    for (let i=1; i<trail.length; i++) ctx.lineTo(trail[i].x,trail[i].y);
    if (!showArms) ctx.closePath(); // close path when fully drawn
    ctx.strokeStyle= showArms ? 'rgba(200,225,255,0.88)' : 'rgba(230,240,255,0.96)';
    ctx.lineWidth  = showArms ? 1.4 : 1.8;
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.stroke();
  }

  // Tip dot (only while drawing)
  if (showArms) {
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3.5,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let curIdx=0, t=0, trail=[], phase='drawing', holdMs=0, lastTs=null, paused=false;
const HOLD_DURATION=2000;
const DRAW_SPEED=0.003; // ~333 frames per shape (~5.5s at 60fps)

function tick(ts) {
  if (!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  if (!paused) {
    const pose=computed[curIdx];
    if (phase==='drawing') {
      t+=DRAW_SPEED*60*dt;
      if (t>=1) { t=1; phase='holding'; holdMs=0; }
      const {tip}=evalEpicycles(pose.freqs,t);
      trail.push(tip);
      drawFrame(pose,t,trail,true);
    } else {
      drawFrame(pose,t,trail,false); // clean — no arms, just outline
      holdMs+=dt*1000;
      if (holdMs>=HOLD_DURATION) {
        curIdx=(curIdx+1)%POSES.length;
        t=0; trail=[]; phase='drawing'; holdMs=0;
        setLabel(curIdx);
      }
    }
  }
  requestAnimationFrame(tick);
}

// ── API ───────────────────────────────────────────────────────────────────────
window.salah={
  jumpTo(idx){ curIdx=((idx%POSES.length)+POSES.length)%POSES.length; t=0; trail=[]; phase='drawing'; holdMs=0; setLabel(curIdx); },
  pause(){ paused=true; },
  resume(){ paused=false; },
  forceComplete(idx) {
    // Jump to position and immediately show completed outline (no arms)
    curIdx=((idx%POSES.length)+POSES.length)%POSES.length;
    // Build full trail from DFT evaluation
    const pose=computed[curIdx];
    trail=[];
    for (let i=0; i<=N_SAMPLES; i++) {
      const {tip}=evalEpicycles(pose.freqs, i/N_SAMPLES);
      trail.push(tip);
    }
    t=1; phase='holding'; holdMs=0;
    setLabel(curIdx);
    drawFrame(pose,1,trail,false);
  }
};

setLabel(0);
const {tip}=evalEpicycles(computed[0].freqs,0);
trail.push(tip);
drawFrame(computed[0],0,trail,true);
requestAnimationFrame(tick);

})();
</script>
