<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calibration — تقويم</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050510; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let S, R, CX, CY;

function resize(){
  S = Math.min(window.innerWidth, window.innerHeight, 760);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
  R  = S * 0.265;
  CX = S * 0.5;
  CY = S * 0.46;
}
resize();
window.addEventListener('resize', ()=>{ resize(); });

// ── Geometry ───────────────────────────────────────────────────────────────────
// Six circle centres in hexagonal arrangement
// Centre at index 0, then 6 outer at angles 0,60,120,180,240,300 degrees
const SQRT3 = Math.sqrt(3);

function centres(){
  const c = [[CX, CY]]; // centre
  for(let i=0;i<6;i++){
    const a = i * Math.PI/3;
    c.push([CX + R*Math.cos(a), CY + R*Math.sin(a)]);
  }
  return c;
}

// ── Animation state machine ───────────────────────────────────────────────────
// Each 'step' is either: draw arc, draw line, pause, reveal figure, show label
// We animate with requestAnimationFrame and a time parameter

const STEPS = [
  // 0: fade in the centre point
  { type:'point', cx:()=>CX, cy:()=>CY, dur:600 },
  // 1: draw central circle
  { type:'arc', cx:()=>CX, cy:()=>CY, r:()=>R, a0:0, a1:TAU, dur:1600, color:'main' },
  // 2: pause
  { type:'pause', dur:400 },
  // 3: first petal — right (0°)
  { type:'arc', cx:()=>CX+R, cy:()=>CY, r:()=>R, a0:Math.PI*2/3, a1:Math.PI*4/3, dir:-1, dur:1400, color:'main' },
  // 4: upper-right petal (60°)
  { type:'arc', cx:()=>CX+R*0.5, cy:()=>CY-R*SQRT3/2, r:()=>R, a0:Math.PI, a1:Math.PI*5/3, dir:1, dur:1200, color:'main' },
  // 5: upper-left petal (120°)
  { type:'arc', cx:()=>CX-R*0.5, cy:()=>CY-R*SQRT3/2, r:()=>R, a0:Math.PI*4/3, a1:TAU, dir:1, dur:1200, color:'main' },
  // 6: left petal (180°)
  { type:'arc', cx:()=>CX-R, cy:()=>CY, r:()=>R, a0:-Math.PI/3, a1:Math.PI/3, dir:1, dur:1400, color:'main' },
  // 7: lower-left petal (240°) — this becomes the HEAD
  { type:'arc', cx:()=>CX-R*0.5, cy:()=>CY+R*SQRT3/2, r:()=>R, a0:0, a1:Math.PI*2/3, dir:1, dur:1200, color:'head' },
  // 8: lower-right petal (300°)
  { type:'arc', cx:()=>CX+R*0.5, cy:()=>CY+R*SQRT3/2, r:()=>R, a0:Math.PI*2/3, a1:Math.PI*4/3, dir:1, dur:1200, color:'main' },
  // 9: pause — full flower
  { type:'pause', dur:500 },
  // 10: inscribed hexagon lines
  { type:'hexagon', dur:1400 },
  // 11: pause
  { type:'pause', dur:500 },
  // 12: ground line
  { type:'line', x1:()=>CX-R*1.8, y1:()=>CY+R, x2:()=>CX+R*1.8, y2:()=>CY+R, dur:800, color:'ground' },
  // 13: pause before reveal
  { type:'pause', dur:800 },
  // 14: REVELATION — fade construction, draw figure stroke by stroke
  { type:'reveal', dur:4500 },
  // 15: hold + label
  { type:'label', dur:3500 },
  // 16: hold complete
  { type:'pause', dur:1500 },
];

let stepIdx = 0;
let stepProgress = 0; // 0..1
let stepStart = null;
let drawnArcs = []; // accumulated drawn geometry
let revealAlpha = 0;
let labelAlpha = 0;

function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t){ return 1-(1-t)*(1-t); }

// ── Draw accumulated construction ─────────────────────────────────────────────
function drawConstruction(alpha=1){
  const dimAlpha = alpha;
  for(const d of drawnArcs){
    const a = (d.alpha||1) * dimAlpha;
    if(a < 0.001) continue;
    ctx.save();
    if(d.type==='arc'){
      const col = d.color==='head'   ? `rgba(215,228,255,${a*0.60})`
                : d.color==='ground' ? `rgba(215,228,255,${a*0.55})`
                :                      `rgba(215,228,255,${a*0.55})`;
      ctx.strokeStyle=col;
      ctx.lineWidth=0.8;
      ctx.beginPath();
      if(d.dir===-1) ctx.arc(d.cx,d.cy,d.r,d.a1,d.a0,true);
      else            ctx.arc(d.cx,d.cy,d.r,d.a0,d.a1,false);
      ctx.stroke();
    } else if(d.type==='line'){
      const col = d.color==='ground' ? `rgba(215,228,255,${a*0.55})`
                :                      `rgba(215,228,255,${a*0.55})`;
      ctx.strokeStyle=col;
      ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(d.x1,d.y1);
      ctx.lineTo(d.x2,d.y2);
      ctx.stroke();
    } else if(d.type==='hexagon'){
      ctx.strokeStyle=`rgba(215,228,255,${a*0.42})`;
      ctx.lineWidth=0.7;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a0=i*Math.PI/3, a1=(i+1)*Math.PI/3;
        const x0=CX+R*Math.cos(a0), y0=CY+R*Math.sin(a0);
        const x1=CX+R*Math.cos(a1), y1=CY+R*Math.sin(a1);
        if(i===0) ctx.moveTo(x0,y0); else ctx.lineTo(x0,y0);
      }
      ctx.closePath();
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Draw figure (sujud) — joints anchored to construction geometry ─────────────
// Ground at y = CY + R
// The hexagonal grid's 6 outer points sit ON the ground or near it.
// We anchor the body to these verified intersection points.
//
// Key anchors (all in canvas coords):
//   Ground line:      y = CY + R
//   Left petal centre (240°): CX - R*0.5, CY + R*√3/2   ← head circle centre
//   Hip pivot:         CX, CY  (centre of construction)
//   Right petal (0°): CX + R, CY   ← knee area
//   Lower-right (300°): CX + R*0.5, CY + R*√3/2  ← knee on ground
//
// Body: figure faces LEFT. Forehead left, knees right.

function drawFigure(progress){
  // progress 0..1 — draw strokes sequentially, each stroke gets equal slice
  if(progress<=0) return;
  ctx.save();
  ctx.lineJoin='round'; ctx.lineCap='round';

  const GY = CY + R;  // ground

  // BODY LANDMARKS — head shifted further LEFT/forward into prostration position
  const hipX   = CX,            hipY   = CY;
  const kneeX  = CX + R*0.55,   kneeY  = GY;
  const ankleX = CX + R*0.82,   ankleY = GY;
  const toeX   = CX + R*1.06,   toeY   = GY;

  // Head: further left/forward — forehead well past construction edge
  const headCX = CX - R*1.45,   headCY = GY - R*0.18;
  const headR  = R * 0.22;

  const shoulderX = hipX - R*0.52, shoulderY = hipY - R*0.20;
  const apexX     = hipX - R*0.08, apexY     = hipY - R*0.52;
  const neckX     = headCX + headR*0.6, neckY = headCY - headR*0.7;
  const handX     = headCX - headR*1.6, handY = GY; // hands well past head

  const W = 1.5*(S/720);
  const bright=`rgba(225,238,255,0.94)`, dim=`rgba(180,205,245,0.72)`;
  const glow=`rgba(200,225,255,0.4)`;

  // 8 strokes + dots = 9 stages, each gets 1/9 of progress
  const N = 9;
  function strokeStyle(c,lw){ ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.shadowBlur=7; ctx.shadowColor=glow; }

  // Helper: draw a partial path segment (t=0..1) + show compass tip at end
  function partialLine(x1,y1,x2,y2,t){
    const ex=x1+(x2-x1)*t, ey=y1+(y2-y1)*t;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
    if(t<1) drawCompass(x1,y1,ex,ey,0.75);
  }
  function partialArc(cx,cy,r,a0,a1,t,ccw){
    const span=(a1-a0)*(ccw?-1:1);
    const endA=a0+span*t;
    ctx.beginPath(); ctx.arc(cx,cy,r,a0,endA,ccw); ctx.stroke();
    if(t<1){
      const tx=cx+r*Math.cos(endA), ty=cy+r*Math.sin(endA);
      drawCompass(cx,cy,tx,ty,0.75);
    }
  }
  function partialBezier(x1,y1,cpx,cpy,x2,y2,t){
    const steps=30; ctx.beginPath(); ctx.moveTo(x1,y1);
    let ex=x1,ey=y1;
    for(let i=1;i<=Math.ceil(steps*t);i++){
      const s=Math.min(i/steps,t);
      ex=(1-s)*(1-s)*x1+2*(1-s)*s*cpx+s*s*x2;
      ey=(1-s)*(1-s)*y1+2*(1-s)*s*cpy+s*s*y2;
      ctx.lineTo(ex,ey);
    }
    ctx.stroke();
    if(t<1) drawCompass(x1,y1,ex,ey,0.75);
  }

  // Stage fractions
  function stageFrac(stage){ // returns 0..1 for how far through this stage
    const start = stage/N, end = (stage+1)/N;
    return Math.max(0, Math.min(1, (progress-start)/(end-start)));
  }

  // 0: HEAD circle
  { const t=stageFrac(0);
    if(t>0){ strokeStyle(bright,W*1.15); partialArc(headCX,headCY,headR,0,TAU,t,false); }}

  // 1: NECK line head→shoulder
  { const t=stageFrac(1);
    if(t>0){ strokeStyle(dim,W); partialLine(neckX,neckY,shoulderX,shoulderY,t); }}

  // 2: SPINE bezier shoulder→apex→hip
  { const t=stageFrac(2);
    if(t>0){ strokeStyle(bright,W*1.2); partialBezier(shoulderX,shoulderY,apexX-R*0.15,apexY,hipX,hipY,t); }}

  // 3: THIGH hip→knee
  { const t=stageFrac(3);
    if(t>0){ strokeStyle(bright,W*1.1); partialLine(hipX+R*0.06,hipY,kneeX,kneeY,t); }}

  // 4: SHIN knee→ankle
  { const t=stageFrac(4);
    if(t>0){ strokeStyle(dim,W); partialLine(kneeX,kneeY,ankleX,ankleY,t); }}

  // 5: FOOT ankle→toe
  { const t=stageFrac(5);
    if(t>0){ strokeStyle(dim,W*0.85); partialLine(ankleX,ankleY,toeX,toeY,t); }}

  // 6: UPPER ARM shoulder→hand
  { const t=stageFrac(6);
    if(t>0){ strokeStyle(dim,W*0.9); partialBezier(shoulderX,shoulderY+R*0.1,shoulderX-R*0.28,GY-R*0.05,handX,handY,t); }}

  // 7: FOREARM → further forward (hand extends toward forehead)
  { const t=stageFrac(7);
    if(t>0){ strokeStyle(dim,W*0.8); partialLine(handX,handY,headCX-headR*1.1,GY,t); }}

  // 8: 7 CONTACT DOTS appear
  { const t=stageFrac(8);
    if(t>0){
      const dotR2=R*0.026*t;
      ctx.fillStyle=`rgba(230,245,255,${0.88*t})`; ctx.shadowBlur=10; ctx.shadowColor=`rgba(200,225,255,${0.7*t})`;
      for(const [px,py] of [
        [headCX-headR*1.0, GY],       // forehead
        [handX-R*0.12, GY],           // left palm
        [handX+R*0.08, GY],           // right palm
        [kneeX-R*0.10, GY],           // left knee
        [kneeX+R*0.10, GY],           // right knee
        [toeX-R*0.06, GY],            // left toes
        [toeX+R*0.06, GY],            // right toes
      ]){ ctx.beginPath(); ctx.arc(px,py,dotR2,0,TAU); ctx.fill(); }
    }
  }

  ctx.restore();
}

// ── Draw label ────────────────────────────────────────────────────────────────
function drawLabel(alpha){
  if(alpha<=0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(200,185,120,1)';
  ctx.font = `${S*0.042}px 'Georgia', serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0.08em';
  ctx.fillText('أحسن تقويم', CX, CY + R*1.32);
  ctx.font = `${S*0.016}px Georgia, serif`;
  ctx.fillStyle = 'rgba(180,165,110,0.8)';
  ctx.letterSpacing = '0.2em';
  ctx.fillText('CALIBRATION', CX, CY + R*1.50);
  ctx.restore();
}

// ── Draw compass indicator ────────────────────────────────────────────────────
function drawCompass(pivotX, pivotY, tipX, tipY, alpha){
  if(alpha<=0) return;
  ctx.save();
  // Pivot point glow
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 3.5, 0, TAU);
  ctx.fillStyle=`rgba(255,255,255,${alpha*0.9})`;
  ctx.shadowBlur=10; ctx.shadowColor=`rgba(200,220,255,${alpha*0.8})`;
  ctx.fill();
  // Arm to tip
  ctx.strokeStyle=`rgba(200,220,255,${alpha*0.4})`;
  ctx.lineWidth=0.7;
  ctx.shadowBlur=0;
  ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(tipX,tipY); ctx.stroke();
  ctx.setLineDash([]);
  // Tip glow
  ctx.beginPath(); ctx.arc(tipX,tipY,2.5,0,TAU);
  ctx.fillStyle=`rgba(255,255,255,${alpha*0.95})`;
  ctx.shadowBlur=12; ctx.shadowColor=`rgba(180,210,255,${alpha})`;
  ctx.fill();
  ctx.restore();
}

// ── Active arc drawing ────────────────────────────────────────────────────────
function drawActiveArc(step, progress){
  const t = easeInOut(progress);
  const a0 = step.a0, a1 = step.a1;
  const cx = step.cx(), cy = step.cy(), r = step.r();
  const span = (step.dir===-1) ? -(((a0-a1)+TAU)%TAU) : ((a1-a0+TAU)%TAU);
  const currentEnd = a0 + span*t;

  const col = step.color==='head'   ? `rgba(180,215,255,0.85)`
            : step.color==='ground' ? `rgba(215,228,255,0.75)`
            :                         `rgba(215,228,255,0.85)`;

  ctx.save();
  ctx.strokeStyle=col;
  ctx.lineWidth=1.1;
  ctx.shadowBlur=6; ctx.shadowColor=col;
  ctx.beginPath();
  if(step.dir===-1) ctx.arc(cx,cy,r,currentEnd,a0,true);
  else               ctx.arc(cx,cy,r,a0,currentEnd,false);
  ctx.stroke();
  ctx.restore();

  // Tip of compass
  const tipAngle = (step.dir===-1) ? currentEnd : currentEnd;
  const tipX = cx + r*Math.cos(tipAngle);
  const tipY = cy + r*Math.sin(tipAngle);
  drawCompass(cx, cy, tipX, tipY, 0.85);
}

function drawActiveLine(step, progress){
  const t = easeOut(progress);
  const x1=step.x1(), y1=step.y1(), x2=step.x2(), y2=step.y2();
  const ex=x1+(x2-x1)*t, ey=y1+(y2-y1)*t;
  const col = step.color==='ground' ? `rgba(215,228,255,0.75)` : `rgba(215,228,255,0.85)`;
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=1.0;
  ctx.shadowBlur=5; ctx.shadowColor=col;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
  ctx.restore();
  drawCompass(x1,y1,ex,ey,0.8);
}

function drawActiveHexagon(progress){
  const t = easeInOut(progress);
  ctx.save();
  ctx.strokeStyle=`rgba(215,228,255,0.70)`;
  ctx.lineWidth=0.85;
  ctx.shadowBlur=4; ctx.shadowColor=`rgba(215,228,255,0.45)`;
  const total = 6;
  const drawn = t * total;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a0=i*Math.PI/3, a1=(i+1)*Math.PI/3;
    const x0=CX+R*Math.cos(a0), y0=CY+R*Math.sin(a0);
    const x1=CX+R*Math.cos(a1), y1=CY+R*Math.sin(a1);
    if(i===0){ ctx.moveTo(x0,y0); }
    if(drawn >= i+1){
      ctx.lineTo(x1,y1);
    } else if(drawn > i){
      const frac=drawn-i;
      ctx.lineTo(x0+(x1-x0)*frac, y0+(y1-y0)*frac);
    }
  }
  ctx.stroke();
  ctx.restore();
}

// ── Main render loop ──────────────────────────────────────────────────────────
let lastTs = null;

function tick(ts){
  if(!lastTs) lastTs=ts;
  const elapsed = ts - lastTs;
  lastTs = ts;

  if(stepStart===null) stepStart=ts;
  const stepElapsed = ts - stepStart;
  const step = STEPS[stepIdx];
  const progress = Math.min(1, stepElapsed / step.dur);

  // Clear
  ctx.fillStyle='#050510';
  ctx.fillRect(0,0,S,S);

  // Draw all completed construction
  const revealStep = STEPS.findIndex(s=>s.type==='reveal');
  const inReveal = stepIdx >= revealStep;
  const constructionAlpha = inReveal ? 0.45 : 1;
  drawConstruction(constructionAlpha);

  // Draw active step
  if(step.type==='arc' && progress<1){
    drawActiveArc(step, progress);
  } else if(step.type==='line' && progress<1){
    drawActiveLine(step, progress);
  } else if(step.type==='hexagon' && progress<1){
    drawActiveHexagon(progress);
  } else if(step.type==='point'){
    const a = easeOut(progress);
    ctx.beginPath(); ctx.arc(CX,CY,2,0,TAU);
    ctx.fillStyle=`rgba(255,255,255,${a*0.9})`;
    ctx.shadowBlur=12; ctx.shadowColor=`rgba(200,220,255,${a*0.8})`;
    ctx.fill(); ctx.shadowBlur=0;
  }

  // Figure reveal — draw strokes one by one
  if(stepIdx >= revealStep){
    if(step.type==='reveal'){
      // 7 strokes + dots: each gets 1/8 of the duration
      revealAlpha = progress; // 0→1 drives which strokes are visible
    } else {
      revealAlpha = 1;
    }
  }
  if(revealAlpha > 0) drawFigure(revealAlpha);

  // Label
  if(step.type==='label'){
    labelAlpha = easeInOut(progress);
    drawLabel(labelAlpha);
  } else if(stepIdx > STEPS.findIndex(s=>s.type==='label')){
    drawLabel(1);
  }

  // Advance step
  if(progress >= 1){
    // Commit completed arc/line/hexagon to drawnArcs
    if(step.type==='arc'){
      drawnArcs.push({type:'arc',cx:step.cx(),cy:step.cy(),r:step.r(),a0:step.a0,a1:step.a1,dir:step.dir||1,color:step.color});
    } else if(step.type==='line'){
      drawnArcs.push({type:'line',x1:step.x1(),y1:step.y1(),x2:step.x2(),y2:step.y2(),color:step.color});
    } else if(step.type==='hexagon'){
      drawnArcs.push({type:'hexagon'});
    }

    stepIdx++;
    stepStart = ts;

    if(stepIdx >= STEPS.length){
      // Reset and loop
      setTimeout(()=>{
        stepIdx=0; stepStart=null; lastTs=null;
        drawnArcs=[]; revealAlpha=0; labelAlpha=0;
      }, 1000);
    }
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
