<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Constructivist Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight-50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
}
resize(); window.addEventListener('resize', resize);

// normalised → pixel
function px(nx,ny){ return [S/2+nx*S*0.38, S/2+ny*S*0.38]; }

// ── Exact epicycle chains ─────────────────────────────────────────────────────

// CIRCLE: 1 arm
function circleChain(cx,cy,r){
  const [pcx,pcy]=px(cx,cy), pr=r*S*0.38;
  return [{dc:true,x:pcx,y:pcy},{freq:1,amp:pr,phase:0}];
}

// LINE P1→P2: 2 counter-rotating arms
// traces P1→P2 at t=0..0.5, back at t=0.5..1 → use tMax=0.5
function lineChain(x1,y1,x2,y2){
  const [mx,my]=px((x1+x2)/2,(y1+y2)/2);
  const [p1x,p1y]=px(x1,y1), [p2x,p2y]=px(x2,y2);
  const hx=(p2x-p1x)/2, hy=(p2y-p1y)/2;
  const amp=Math.sqrt(hx*hx+hy*hy), phi=Math.atan2(hy,hx);
  return [
    {dc:true,x:mx,y:my},
    {freq:+1,amp,phase:phi+Math.PI},
    {freq:-1,amp,phase:phi+Math.PI},
  ];
}

// ROTATED RECTANGLE corner helpers
function rectCorners(cx,cy,w,h,angle){
  const corners=[[-w,-h],[w,-h],[w,h],[-w,h]];
  return corners.map(([lx,ly])=>[
    lx*Math.cos(angle)-ly*Math.sin(angle)+cx,
    lx*Math.sin(angle)+ly*Math.cos(angle)+cy,
  ]);
}

// ── Eval ─────────────────────────────────────────────────────────────────────
function evalChain(chain,t){
  let x=0,y=0; const arms=[];
  for(const c of chain){
    let nx,ny;
    if(c.dc){nx=c.x;ny=c.y;}
    else{
      const a=c.freq*TAU*t+(c.phase||0);
      nx=x+c.amp*Math.cos(a); ny=y+c.amp*Math.sin(a);
      if(c.amp>2) arms.push({x0:x,y0:y,x1:nx,y1:ny,r:c.amp});
    }
    x=nx;y=ny;
  }
  return {tip:{x,y},arms};
}

// ── Sujud stroke list ─────────────────────────────────────────────────────────
// Constructivist: head circle, forearms (lines), tilted back rectangle (4 edges), knee circle, foot line

const A = -Math.PI*0.30; // ~54° tilt for back/torso rectangle
const RC = rectCorners(-0.06,0.10, 0.14,0.50, A); // [TL,TR,BR,BL]

const STROKES = [
  // 1. Head circle
  { chain: circleChain(-0.46, 0.26, 0.14),
    tMax:1, color:[215,230,255], lw:2.0, close:false },

  // 2. Left forearm
  { chain: lineChain(-0.30,0.38, -0.64,0.46),
    tMax:0.5, color:[160,195,245], lw:1.4, close:false },

  // 3. Right forearm
  { chain: lineChain(-0.30,0.38, -0.06,0.36),
    tMax:0.5, color:[160,195,245], lw:1.4, close:false },

  // 4–7. Back rectangle — 4 edges (TL→TR, TR→BR, BR→BL, BL→TL)
  { chain: lineChain(...RC[0], ...RC[1]),
    tMax:0.5, color:[215,230,255], lw:2.2, close:false },
  { chain: lineChain(...RC[1], ...RC[2]),
    tMax:0.5, color:[215,230,255], lw:2.2, close:false },
  { chain: lineChain(...RC[2], ...RC[3]),
    tMax:0.5, color:[215,230,255], lw:2.2, close:false },
  { chain: lineChain(...RC[3], ...RC[0]),
    tMax:0.5, color:[215,230,255], lw:2.2, close:false },

  // 8. Knee circle (small)
  { chain: circleChain(0.28, 0.46, 0.07),
    tMax:1, color:[160,195,245], lw:1.6, close:false },

  // 9. Foot line
  { chain: lineChain(0.32,0.54, 0.54,0.56),
    tMax:0.5, color:[160,195,245], lw:1.4, close:false },

  // 10. Ground
  { chain: lineChain(-0.68,0.62, 0.62,0.62),
    tMax:0.5, color:[75,108,160], lw:0.7, close:false },
];

// ── Animation ─────────────────────────────────────────────────────────────────
const DRAW_SPEED  = 0.020;
const HOLD_FRAMES = 120;

let idx=0, t=0;
let trails = STROKES.map(()=>[]);
let phase='drawing', holding=0, lastTs=null, paused=false;

function drawArms(arms){
  for(const a of arms){
    if(a.r<2) continue;
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.7; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.32)'; ctx.lineWidth=0.9; ctx.stroke();
  }
}

function drawTrail(pts,rgb,lw){
  if(pts.length<2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.90)`;
  ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
}

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;

  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);

  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      const tM=STROKES[idx].tMax;
      if(t>=tM){
        t=tM;
        const {tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip);
        idx++;
        if(idx>=STROKES.length){phase='holding';holding=0;}
        else{t=0;trails[idx]=[];}
      } else {
        const {tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip);
      }
    } else {
      holding+=dt*60;
      if(holding>HOLD_FRAMES){ idx=0;t=0;trails=STROKES.map(()=>[]);phase='drawing'; }
    }
  }

  // Completed
  for(let i=0;i<Math.min(idx,STROKES.length);i++)
    if(trails[i].length>1) drawTrail(trails[i],STROKES[i].color,STROKES[i].lw);

  // Active
  if(phase==='drawing'&&idx<STROKES.length){
    const s=STROKES[idx];
    const {tip,arms}=evalChain(s.chain,t);
    if(trails[idx].length>1) drawTrail(trails[idx],s.color,s.lw);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }
  requestAnimationFrame(tick);
}

window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true;
    STROKES.forEach((s,i)=>{
      trails[i]=[];
      const N=80;
      for(let j=0;j<=N;j++){
        const {tip}=evalChain(s.chain,j/N*s.tMax);
        trails[i].push(tip);
      }
    });
    idx=STROKES.length; phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    STROKES.forEach((s,i)=>{ if(trails[i].length>1) drawTrail(trails[i],s.color,s.lw); });
  }
};

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
