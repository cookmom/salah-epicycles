<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.4); font-size:11px; letter-spacing:.28em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud — Prostration</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let S;
function resize() {
  S = Math.min(window.innerWidth, window.innerHeight - 50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S + 'px';
}
resize();
window.addEventListener('resize', resize);

// Normalised → pixel
function px(nx, ny) {
  return [S/2 + nx * S * 0.38, S/2 + ny * S * 0.38];
}

// ── Exact epicycle representations ───────────────────────────────────────────
//
// CIRCLE at (cx,cy) radius r:
//   chain: [DC arm to centre] + [single rotating arm of length r]
//   at t: angle = TAU*t → traces circle exactly with 1 arm
//
// LINE from P1 to P2:
//   midpoint M, half-vec H = (P2-P1)/2
//   chain: [DC arm to M] + [arm +H rotating at +1] + [arm +H rotating at -1]
//   sum of two counter-rotating arms of equal length = straight line (Fourier identity)
//   at t: arm1 angle = +TAU*t,  arm2 angle = -TAU*t
//   tip traces the line segment exactly
//
// ARC from angle a0 to a1 on circle (cx,cy,r):
//   parametric: (cx + r*cos(a0 + (a1-a0)*t), cy + r*sin(a0+(a1-a0)*t))
//   = pure rotation, best approximated with a few DFT terms
//   or simply drawn by 2-3 arms tuned to the arc span

// Build a "stroke" descriptor for each body part.
// Each stroke has an epicycle chain + colour + linewidth.

// Helper: build arm chain for a circle
function circleArms(cx, cy, r) {
  const [mcx, mcy] = px(cx, cy);
  return [
    { dc: true, x: mcx,  y: mcy },   // DC: jump to centre
    { freq: 1,  amp: r * S * 0.38 }, // single rotating arm
  ];
}

// Helper: build arm chain for a line P1→P2
// Two equal counter-rotating arms: sum traces a line segment
// At t=0: tip at P1. At t=0.5: tip at P2. At t=1: tip at P1 again.
// arm1 angle = TAU*t + phi,  arm2 angle = -TAU*t + phi
// sum = 2*amp*cos(TAU*t) in the direction phi → line from -amp to +amp in direction phi
function lineArms(x1, y1, x2, y2) {
  const [mx, my]   = px((x1+x2)/2, (y1+y2)/2);
  const [p1x, p1y] = px(x1, y1);
  const [p2x, p2y] = px(x2, y2);
  const hx = (p2x - p1x) / 2;
  const hy = (p2y - p1y) / 2;
  const amp = Math.sqrt(hx*hx + hy*hy);
  const phi = Math.atan2(hy, hx);
  // At t=0, cos(0)=1, so tip = midpoint + amp*(cos(phi),sin(phi)) = P2
  // At t=0.5, cos(π)=-1, so tip = midpoint - amp*(cos(phi),sin(phi)) = P1
  // We want t=0 → P1, so offset phase by π
  return [
    { dc: true, x: mx, y: my },
    { freq: +1, amp, phase: phi + Math.PI },
    { freq: -1, amp, phase: phi + Math.PI },
  ];
}

// Evaluate a chain at parameter t → returns {tip, arms:[{x0,y0,x1,y1,r}]}
function evalChain(chain, t) {
  let x = 0, y = 0;
  const arms = [];
  for (const c of chain) {
    let nx, ny;
    if (c.dc) {
      nx = c.x; ny = c.y;
    } else {
      // freq can be negative (counter-rotating)
      const angle = c.freq * TAU * t + (c.phase || 0);
      nx = x + c.amp * Math.cos(angle);
      ny = y + c.amp * Math.sin(angle);
      if (c.amp > 1.5) arms.push({ x0:x, y0:y, x1:nx, y1:ny, r:c.amp });
    }
    x = nx; y = ny;
  }
  return { tip:{x,y}, arms };
}

// ── Sujud stroke list ─────────────────────────────────────────────────────────
// Figure faces LEFT. Normalised coords: ground ≈ y=0.55, centre of canvas = (0,0)
// Sequence: head → spine → left arm → right arm → thigh → shin → ground

const STROKES = [
  { name:'head',
    chain: circleArms(-0.42, 0.22, 0.14),
    color:[210,228,255], lw:1.6 },

  { name:'spine',
    chain: lineArms(-0.28, 0.32,  0.18, -0.12),
    color:[210,228,255], lw:1.6 },

  { name:'arm-l',
    chain: lineArms(-0.28, 0.44,  -0.58, 0.50),
    color:[170,200,245], lw:1.3 },

  { name:'arm-r',
    chain: lineArms(-0.28, 0.44,  -0.06, 0.46),
    color:[170,200,245], lw:1.3 },

  { name:'thigh',
    chain: lineArms(0.18, -0.12,  0.26, 0.40),
    color:[210,228,255], lw:1.6 },

  { name:'shin',
    chain: lineArms(0.26, 0.40,  0.46, 0.52),
    color:[170,200,245], lw:1.3 },

  { name:'ground',
    chain: lineArms(-0.62, 0.56,  0.54, 0.56),
    color:[90,120,170], lw:0.6 },
];

// ── Animation ─────────────────────────────────────────────────────────────────
const DRAW_SPEED = 0.022;   // t increment per 60fps frame
const HOLD_FRAMES = 100;

let idx     = 0;   // current stroke index
let t       = 0;
let trails  = STROKES.map(() => []);
let phase   = 'drawing';
let holding = 0;
let lastTs  = null;
let paused  = false;

function drawArms(arms, alpha=1) {
  for (const a of arms) {
    if (a.r < 2) continue;
    ctx.beginPath();
    ctx.arc(a.x0, a.y0, a.r, 0, TAU);
    ctx.strokeStyle = `rgba(110,168,255,${0.10*alpha})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(a.x0, a.y0);
    ctx.lineTo(a.x1, a.y1);
    ctx.strokeStyle = `rgba(130,185,255,${0.35*alpha})`;
    ctx.lineWidth = 0.9;
    ctx.stroke();
  }
}

function drawTrail(pts, rgb, lw, alpha=1) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${0.90*alpha})`;
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';
  ctx.stroke();
}

function tick(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts;

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, S, S);

  if (!paused) {
    if (phase === 'drawing') {
      t += DRAW_SPEED * 60 * dt;
      if (t >= 1) {
        t = 1;
        const {tip} = evalChain(STROKES[idx].chain, 1);
        trails[idx].push(tip);
        idx++;
        if (idx >= STROKES.length) { phase = 'holding'; holding = 0; }
        else { t = 0; trails[idx] = []; }
      } else {
        const {tip} = evalChain(STROKES[idx].chain, t);
        trails[idx].push(tip);
      }
    } else {
      holding += dt * 60;
      if (holding > HOLD_FRAMES) {
        idx = 0; t = 0; trails = STROKES.map(()=>[]); phase = 'drawing';
      }
    }
  }

  // All completed strokes
  for (let i = 0; i < Math.min(idx, STROKES.length); i++) {
    if (trails[i].length > 1)
      drawTrail(trails[i], STROKES[i].color, STROKES[i].lw);
  }

  // Current stroke: trail + arms
  if (phase === 'drawing' && idx < STROKES.length) {
    const s = STROKES[idx];
    const {tip, arms} = evalChain(s.chain, t);
    if (trails[idx].length > 1) drawTrail(trails[idx], s.color, s.lw);
    drawArms(arms);
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 3, 0, TAU);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fill();
  }

  requestAnimationFrame(tick);
}

window.salah = {
  pause()  { paused = true; },
  resume() { paused = false; },
  forceComplete() {
    paused = true;
    STROKES.forEach((s, i) => {
      trails[i] = [];
      for (let j=0; j<=80; j++) {
        const {tip} = evalChain(s.chain, j/80);
        trails[i].push(tip);
      }
    });
    idx = STROKES.length; phase = 'holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    for(let i=0;i<STROKES.length;i++)
      if(trails[i].length>1) drawTrail(trails[i],STROKES[i].color,STROKES[i].lw);
  }
};

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
