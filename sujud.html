<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Constructivist Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight-50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
}
resize(); window.addEventListener('resize', resize);

// Normalised (-1..1) → pixel
function px(nx,ny){ return [S*0.5+nx*S*0.72, S*0.5+ny*S*0.72]; }

// ── Exact epicycle chains ─────────────────────────────────────────────────────
function circleChain(cx,cy,r){
  const [pcx,pcy]=px(cx,cy), pr=r*S*0.38;
  return [{dc:true,x:pcx,y:pcy},{freq:1,amp:pr,phase:0}];
}
function lineChain(x1,y1,x2,y2){
  const [mx,my]=px((x1+x2)/2,(y1+y2)/2);
  const [p1x,p1y]=px(x1,y1),[p2x,p2y]=px(x2,y2);
  const hx=(p2x-p1x)/2,hy=(p2y-p1y)/2;
  const amp=Math.sqrt(hx*hx+hy*hy),phi=Math.atan2(hy,hx);
  return [{dc:true,x:mx,y:my},{freq:+1,amp,phase:phi+Math.PI},{freq:-1,amp,phase:phi+Math.PI}];
}
function rCorners(cx,cy,w,h,ang){
  return [[-w,-h],[w,-h],[w,h],[-w,h]].map(([lx,ly])=>[
    lx*Math.cos(ang)-ly*Math.sin(ang)+cx,
    lx*Math.sin(ang)+ly*Math.cos(ang)+cy
  ]);
}
function rectEdges(cx,cy,w,h,ang,rgb,lw){
  const C=rCorners(cx,cy,w,h,ang);
  return [[0,1],[1,2],[2,3],[3,0]].map(([a,b])=>
    ({chain:lineChain(...C[a],...C[b]),tMax:0.5,color:rgb,lw}));
}
function triEdges(x1,y1,x2,y2,x3,y3,rgb,lw){
  return [
    {chain:lineChain(x1,y1,x2,y2),tMax:0.5,color:rgb,lw},
    {chain:lineChain(x2,y2,x3,y3),tMax:0.5,color:rgb,lw},
    {chain:lineChain(x3,y3,x1,y1),tMax:0.5,color:rgb,lw},
  ];
}

// ── SAM3-derived shape parameters ────────────────────────────────────────────
// Coordinates from SAM3 segmentation of reference image, remapped to canvas space
// Image W=1280, H=698. Remapped with scale=0.62, offset=(-0.06,-0.10)
// Shape orientations estimated from SAM3 mask contour analysis

const W=[215,230,255], D=[160,195,245];

// head:      cx=-0.345, cy=0.298, r≈0.112 (use larger of hw/hh)
// triangle:  cx=-0.045, cy=-0.064, corners estimated from SAM3 bbox+shape
// square:    cx=0.143,  cy=-0.074, hw=0.063, hh=0.102, slight tilt
// arm_rect:  cx=0.003,  cy=0.301,  hw=0.051, hh=0.073, steep tilt
// sm_rect:   cx=0.050,  cy=0.359,  hw=0.033, hh=0.043, slight tilt
// knee:      cx=0.299,  cy=0.161,  r≈0.055
// foot_rect: cx=0.431,  cy=0.250,  hw=0.051, hh=0.048, slight tilt
// foot_tri:  cx=0.492,  cy=0.229,  corners from bbox

const STROKES = [
  // 1. HEAD — circle
  {chain:circleChain(-0.345, 0.298, 0.112), tMax:1, color:W, lw:2.2},

  // 2. BACK TRIANGLE — large, leaning right
  // apex upper-right, base lower-left (from SAM3 bbox: x:-0.147..0.057, y:-0.154..-0.026 → in canvas)
  // apex ~(-0.045+0.102, -0.064-0.091) = (0.057,-0.155)
  // base-left ~(-0.147, -0.026), base-right ~(0.057, -0.026)
  ...triEdges(
     0.057,-0.155,   // apex (upper right)
    -0.147,-0.026,   // base left
     0.057,-0.026,   // base right... but triangle is diagonal not vertical
    W, 2.4),

  // 3. CHEST SQUARE — slightly tilted CW
  ...rectEdges(0.143, -0.074, 0.063, 0.102, Math.PI*0.06, W, 2.2),

  // 4. ARM RECT — steep tilt (forearm angled ~40° CCW)
  ...rectEdges(0.003, 0.301, 0.051, 0.073, -Math.PI*0.38, D, 1.6),

  // 5. SMALL RECT — near ground, minimal tilt
  ...rectEdges(0.050, 0.359, 0.033, 0.043, Math.PI*0.04, D, 1.4),

  // 6. KNEE CIRCLE
  {chain:circleChain(0.299, 0.161, 0.055), tMax:1, color:D, lw:1.8},

  // 7. FOOT RECT — wide flat, slight tilt
  ...rectEdges(0.431, 0.250, 0.051, 0.048, -Math.PI*0.04, D, 1.4),

  // 8. FOOT TRIANGLE — pointing right
  // SAM3 bbox: x:0.452..0.532, y:0.164..0.294 → apex right, base left
  ...triEdges(
    0.532, 0.229,   // apex (right)
    0.452, 0.164,   // top-left
    0.452, 0.294,   // bottom-left
    D, 1.4),

  // 9. GROUND LINE
  {chain:lineChain(-0.72,0.50, 0.72,0.50), tMax:0.5, color:[75,108,160], lw:0.8},
];

// ── Eval ─────────────────────────────────────────────────────────────────────
function evalChain(chain,t){
  let x=0,y=0; const arms=[];
  for(const c of chain){
    let nx,ny;
    if(c.dc){nx=c.x;ny=c.y;}
    else{
      const a=c.freq*TAU*t+(c.phase||0);
      nx=x+c.amp*Math.cos(a); ny=y+c.amp*Math.sin(a);
      if(c.amp>2) arms.push({x0:x,y0:y,x1:nx,y1:ny,r:c.amp});
    }
    x=nx;y=ny;
  }
  return {tip:{x,y},arms};
}

function drawArms(arms){
  for(const a of arms){
    if(a.r<2) continue;
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.7; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.30)'; ctx.lineWidth=0.9; ctx.stroke();
  }
}
function drawTrail(pts,rgb,lw){
  if(pts.length<2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.92)`;
  ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
}

const DRAW_SPEED=0.022, HOLD_FRAMES=120;
let idx=0, t=0, trails=STROKES.map(()=>[]), phase='drawing', holding=0, lastTs=null, paused=false;

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      const tM=STROKES[idx].tMax;
      if(t>=tM){
        t=tM;
        const {tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip);
        idx++; if(idx>=STROKES.length){phase='holding';holding=0;} else{t=0;trails[idx]=[];}
      } else { const {tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip); }
    } else {
      holding+=dt*60;
      if(holding>HOLD_FRAMES){idx=0;t=0;trails=STROKES.map(()=>[]);phase='drawing';}
    }
  }
  for(let i=0;i<Math.min(idx,STROKES.length);i++)
    if(trails[i].length>1) drawTrail(trails[i],STROKES[i].color,STROKES[i].lw);
  if(phase==='drawing'&&idx<STROKES.length){
    const s=STROKES[idx];
    const {tip,arms}=evalChain(s.chain,t);
    if(trails[idx].length>1) drawTrail(trails[idx],s.color,s.lw);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }
  requestAnimationFrame(tick);
}
window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true;
    STROKES.forEach((s,i)=>{
      trails[i]=[];
      for(let j=0;j<=80;j++){const{tip}=evalChain(s.chain,j/80*s.tMax);trails[i].push(tip);}
    });
    idx=STROKES.length; phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    STROKES.forEach((s,i)=>{if(trails[i].length>1) drawTrail(trails[i],s.color,s.lw);});
  }
};
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
