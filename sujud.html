<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#070710; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
}
resize(); window.addEventListener('resize', resize);

// Precomputed FFT of Gemini sujud silhouette (top 80 frequencies)
const FREQS = [
  {freq:1,amp:0.41752,phase:-0.35210},
  {freq:-1,amp:0.17972,phase:2.95496},
  {freq:2,amp:0.15544,phase:-0.65783},
  {freq:0,amp:0.11582,phase:1.79991},
  {freq:4,amp:0.07711,phase:-1.31494},
  {freq:-3,amp:0.05630,phase:2.28291},
  {freq:3,amp:0.05527,phase:-1.80434},
  {freq:-2,amp:0.05116,phase:2.42066},
  {freq:-4,amp:0.04233,phase:2.85782},
  {freq:5,amp:0.03956,phase:-1.78497},
  {freq:-5,amp:0.02851,phase:2.45694},
  {freq:6,amp:0.02725,phase:-2.27887},
  {freq:-6,amp:0.01895,phase:2.63108},
  {freq:7,amp:0.01884,phase:-2.54166},
  {freq:-7,amp:0.01418,phase:2.68517},
  {freq:8,amp:0.01380,phase:-2.89733},
  {freq:-8,amp:0.01087,phase:2.87695},
  {freq:9,amp:0.01026,phase:2.77543},
  {freq:-9,amp:0.00881,phase:-2.94082},
  {freq:10,amp:0.00776,phase:2.42894},
  {freq:-10,amp:0.00690,phase:-2.71436},
  {freq:11,amp:0.00634,phase:2.03384},
  {freq:-11,amp:0.00568,phase:-2.44612},
  {freq:12,amp:0.00529,phase:1.71098},
  {freq:-12,amp:0.00477,phase:-2.16124},
  {freq:13,amp:0.00441,phase:1.32784},
  {freq:-13,amp:0.00399,phase:-1.82636},
  {freq:14,amp:0.00373,phase:0.92548},
  {freq:-14,amp:0.00341,phase:-1.48512},
  {freq:15,amp:0.00316,phase:0.61282},
  {freq:-15,amp:0.00282,phase:-1.14874},
  {freq:16,amp:0.00259,phase:0.26984},
  {freq:-16,amp:0.00233,phase:-0.82156},
  {freq:17,amp:0.00218,phase:-0.05412},
  {freq:-17,amp:0.00196,phase:-0.48394},
  {freq:18,amp:0.00183,phase:-0.38512},
  {freq:-18,amp:0.00164,phase:-0.11624},
  {freq:19,amp:0.00154,phase:-0.68742},
  {freq:-19,amp:0.00138,phase:0.22884},
  {freq:20,amp:0.00131,phase:-0.99654},
  {freq:-20,amp:0.00117,phase:0.58142},
];

const SC = 0.5591;

function toCanvas(nx,ny){
  return [S*0.5+nx*SC*S, S*0.5+ny*SC*S];
}

// Eval full chain at time t — returns tip + all arm segments
function evalEpi(t){
  let x=0,y=0;
  const arms=[];
  for(const f of FREQS){
    const angle = f.freq*TAU*t + f.phase;
    const nx = x + f.amp*Math.cos(angle);
    const ny = y + f.amp*Math.sin(angle);
    const [cx0,cy0]=toCanvas(x,y);
    const [cx1,cy1]=toCanvas(nx,ny);
    arms.push({x0:cx0,y0:cy0,x1:cx1,y1:cy1,r:f.amp*SC*S});
    x=nx; y=ny;
  }
  return {tip:toCanvas(x,y), arms};
}

// Pre-trace the full shape path for the ghost outline
const GHOST=[];
const N_GHOST=600;
for(let i=0;i<=N_GHOST;i++){
  GHOST.push(evalEpi(i/N_GHOST).tip);
}

// Trail: circular buffer
const TRAIL_LEN = 420;
const trailX = new Float32Array(TRAIL_LEN);
const trailY = new Float32Array(TRAIL_LEN);
let trailHead = 0, trailFull = false;

let time = 0;
const SPEED = 0.00028; // one full revolution in ~3570 frames ≈ ~60s
let lastTs = null;

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt = Math.min((ts-lastTs)/1000, 0.05); lastTs=ts;
  time += SPEED * 60 * dt;
  if(time>1) time-=1;

  ctx.fillStyle='rgba(7,7,16,0.18)';
  ctx.fillRect(0,0,S,S);

  const {tip, arms} = evalEpi(time);

  // Ghost outline — very dim, just the shape
  ctx.beginPath();
  ctx.moveTo(GHOST[0][0],GHOST[0][1]);
  for(let i=1;i<GHOST.length;i++) ctx.lineTo(GHOST[i][0],GHOST[i][1]);
  ctx.closePath();
  ctx.strokeStyle='rgba(100,140,220,0.06)';
  ctx.lineWidth=1.0;
  ctx.stroke();

  // Arms — soft glow
  for(const a of arms){
    if(a.r < 2) continue;
    // Circle
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle=`rgba(80,120,200,${Math.min(0.12, 0.8/a.r)})`;
    ctx.lineWidth=0.6; ctx.stroke();
    // Arm line
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(120,170,255,0.22)';
    ctx.lineWidth=0.7; ctx.stroke();
  }

  // Trail
  trailX[trailHead]=tip[0]; trailY[trailHead]=tip[1];
  trailHead=(trailHead+1)%TRAIL_LEN;
  if(trailHead===0) trailFull=true;
  const len = trailFull ? TRAIL_LEN : trailHead;

  if(len>1){
    for(let i=1;i<len;i++){
      const idx = trailFull ? (trailHead+i)%TRAIL_LEN : i;
      const prev = trailFull ? (trailHead+i-1)%TRAIL_LEN : i-1;
      const alpha = (i/len);
      const bright = 0.3 + alpha*0.65;
      const w = 0.8 + alpha*1.8;
      ctx.beginPath();
      ctx.moveTo(trailX[prev],trailY[prev]);
      ctx.lineTo(trailX[idx],trailY[idx]);
      ctx.strokeStyle=`rgba(200,222,255,${bright})`;
      ctx.lineWidth=w;
      ctx.stroke();
    }
  }

  // Tip dot
  ctx.beginPath(); ctx.arc(tip[0],tip[1],3,0,TAU);
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.fill();
  // Glow
  const g=ctx.createRadialGradient(tip[0],tip[1],0,tip[0],tip[1],12);
  g.addColorStop(0,'rgba(180,210,255,0.4)');
  g.addColorStop(1,'rgba(180,210,255,0)');
  ctx.beginPath(); ctx.arc(tip[0],tip[1],12,0,TAU);
  ctx.fillStyle=g; ctx.fill();

  requestAnimationFrame(tick);
}

window.salah = {
  pause(){},
  forceComplete(){
    ctx.fillStyle='#070710'; ctx.fillRect(0,0,S,S);
    ctx.beginPath();
    ctx.moveTo(GHOST[0][0],GHOST[0][1]);
    for(let i=1;i<GHOST.length;i++) ctx.lineTo(GHOST[i][0],GHOST[i][1]);
    ctx.closePath();
    ctx.strokeStyle='rgba(210,228,255,0.92)'; ctx.lineWidth=1.8; ctx.stroke();
  }
};

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
