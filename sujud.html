<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight-50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
}
resize(); window.addEventListener('resize', resize);

// ── Precomputed DFT frequencies ────────────────────────────────────────────────
// Source: cv2 outer contour of merged sujud silhouette (1280×698 reference image)
// 256 equidistant points → DFT → top 80 frequencies by amplitude
// Coordinates normalised: image centre = (0,0), scale = IW/2 = 640px
// 256 silhouette points → DFT → top 80 frequencies
const FREQS = [
  {freq:1,amp:0.43785,phase:-1.75218},
  {freq:0,amp:0.22554,phase:1.64149},
  {freq:-1,amp:0.13671,phase:1.67573},
  {freq:-2,amp:0.05852,phase:-1.35784},
  {freq:2,amp:0.04200,phase:-2.54131},
  {freq:4,amp:0.02915,phase:-1.86372},
  {freq:3,amp:0.02386,phase:1.68200},
  {freq:-3,amp:0.02163,phase:-1.52852},
  {freq:5,amp:0.02068,phase:-2.84011},
  {freq:6,amp:0.01856,phase:-0.67283},
  {freq:7,amp:0.01212,phase:0.47810},
  {freq:-6,amp:0.01072,phase:-2.76174},
  {freq:-7,amp:0.00666,phase:1.73374},
  {freq:9,amp:0.00618,phase:-3.13343},
  {freq:-4,amp:0.00532,phase:-2.95737},
  {freq:-5,amp:0.00484,phase:2.73763},
  {freq:-8,amp:0.00451,phase:0.61989},
  {freq:12,amp:0.00413,phase:-1.51657},
  {freq:10,amp:0.00384,phase:0.25450},
  {freq:-9,amp:0.00373,phase:-0.01549},
  {freq:8,amp:0.00371,phase:-2.46658},
  {freq:-12,amp:0.00364,phase:-2.19920},
  {freq:-10,amp:0.00268,phase:-2.65025},
  {freq:-13,amp:0.00250,phase:1.38044},
  {freq:11,amp:0.00185,phase:1.74386},
  {freq:15,amp:0.00153,phase:2.49081},
  {freq:14,amp:0.00126,phase:0.83731},
  {freq:-17,amp:0.00104,phase:-0.00911},
  {freq:-14,amp:0.00103,phase:1.77952},
  {freq:16,amp:0.00098,phase:-0.87136},
  {freq:-16,amp:0.00070,phase:-2.81946},
  {freq:-15,amp:0.00068,phase:-1.16091},
  {freq:-11,amp:0.00067,phase:-0.34547},
  {freq:13,amp:0.00063,phase:0.50971},
  {freq:17,amp:0.00058,phase:-0.60039},
  {freq:18,amp:0.00051,phase:2.40406},
  {freq:-18,amp:0.00044,phase:-2.55042},
  {freq:-20,amp:0.00039,phase:2.86076},
  {freq:-21,amp:0.00037,phase:-1.20946},
  {freq:20,amp:0.00032,phase:-0.05465},
  {freq:23,amp:0.00030,phase:0.22943},
  {freq:19,amp:0.00029,phase:2.66257},
  {freq:-22,amp:0.00027,phase:1.93658},
  {freq:22,amp:0.00025,phase:-1.89981},
  {freq:-19,amp:0.00019,phase:2.05209},
  {freq:21,amp:0.00019,phase:-2.87788},
  {freq:-23,amp:0.00019,phase:1.06981},
  {freq:-25,amp:0.00019,phase:-2.15052},
  {freq:24,amp:0.00016,phase:1.89026},
  {freq:-27,amp:0.00011,phase:0.36826},
  {freq:-28,amp:0.00009,phase:-2.95417},
  {freq:26,amp:0.00009,phase:-1.61254},
  {freq:28,amp:0.00008,phase:-0.95080},
  {freq:-24,amp:0.00007,phase:0.17849},
  {freq:27,amp:0.00006,phase:2.29643},
  {freq:25,amp:0.00006,phase:2.21332},
  {freq:-33,amp:0.00004,phase:-0.14617},
  {freq:29,amp:0.00003,phase:2.15584},
  {freq:-26,amp:0.00003,phase:-2.90080},
  {freq:-32,amp:0.00003,phase:2.20119},
  {freq:-31,amp:0.00003,phase:-1.50291},
  {freq:-34,amp:0.00003,phase:-2.96880},
  {freq:30,amp:0.00003,phase:0.24057},
  {freq:-29,amp:0.00002,phase:1.51708},
  {freq:-30,amp:0.00002,phase:0.53990},
  {freq:35,amp:0.00001,phase:-2.99722},
  {freq:-36,amp:0.00001,phase:0.66002},
  {freq:-38,amp:0.00001,phase:1.85907},
  {freq:-37,amp:0.00001,phase:-2.26000},
  {freq:31,amp:0.00001,phase:-2.33948},
  {freq:38,amp:0.00001,phase:2.91691},
  {freq:-35,amp:0.00001,phase:-1.83030},
  {freq:37,amp:0.00001,phase:-0.35612},
  {freq:32,amp:0.00001,phase:2.03876},
  {freq:33,amp:0.00001,phase:-1.45417},
  {freq:34,amp:0.00001,phase:0.76896},
  {freq:36,amp:0.00001,phase:-0.74142},
  {freq:39,amp:0.00000,phase:0.14876},
  {freq:-40,amp:0.00000,phase:-1.46598},
  {freq:-39,amp:0.00000,phase:-0.19385},
];

// ── Coordinate mapping ────────────────────────────────────────────────────────
// Figure spans x:-0.903..0.902, y:-0.450..0.448 in normalised space
// Scale to fill 88% of canvas
const SC = 0.88 / 1.312;  // x span

function toCanvas(nx, ny){
  return [S*0.5 + nx*SC*S, S*0.5 + ny*SC*S];
}

// ── Epicycle evaluation ───────────────────────────────────────────────────────
function evalEpicycles(t) {
  let x=0, y=0;
  const arms=[];
  for(const f of FREQS){
    const angle = f.freq * TAU * t + f.phase;
    const nx = x + f.amp * Math.cos(angle);
    const ny = y + f.amp * Math.sin(angle);
    const [cx0,cy0] = toCanvas(x,y);
    const [cx1,cy1] = toCanvas(nx,ny);
    const r = f.amp * SC * S;
    if(r > 2) arms.push({x0:cx0,y0:cy0,x1:cx1,y1:cy1,r});
    x=nx; y=ny;
  }
  const [tipX,tipY] = toCanvas(x,y);
  return {tip:{x:tipX,y:tipY}, arms};
}

// ── Animation ─────────────────────────────────────────────────────────────────
const DRAW_SPEED = 0.0028;
const HOLD_MS    = 2500;

let t=0, trail=[], phase='drawing', holdMs=0, lastTs=null, paused=false;

function drawArms(arms){
  for(const a of arms){
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.32)'; ctx.lineWidth=1.0; ctx.stroke();
  }
}

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);

  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      if(t>=1){ t=1; phase='holding'; holdMs=0; }
      const{tip}=evalEpicycles(t); trail.push({...tip});
    } else {
      holdMs+=dt*1000;
      if(holdMs>HOLD_MS){ t=0; trail=[]; phase='drawing'; }
    }
  }

  // Trail
  if(trail.length>1){
    ctx.beginPath(); ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
    if(phase==='holding') ctx.closePath();
    ctx.strokeStyle=phase==='holding'?'rgba(220,235,255,0.96)':'rgba(200,222,255,0.88)';
    ctx.lineWidth=phase==='holding'?1.8:1.4;
    ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  }

  // Arms (drawing only)
  if(phase==='drawing'){
    const{tip,arms}=evalEpicycles(t);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3.5,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }

  requestAnimationFrame(tick);
}

window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true; t=1; trail=[];
    const N=500;
    for(let i=0;i<=N;i++){const{tip}=evalEpicycles(i/N);trail.push({...tip});}
    phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    ctx.beginPath(); ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
    ctx.closePath();
    ctx.strokeStyle='rgba(220,235,255,0.96)'; ctx.lineWidth=1.8;
    ctx.lineJoin='round'; ctx.stroke();
  }
};

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
