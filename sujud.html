<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Constructivist Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight - 50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S + 'px';
}
resize(); window.addEventListener('resize', resize);

// ── Coordinate system ─────────────────────────────────────────────────────────
// Source coords: normalised to image width, centre = (0,0)
// Image is 1280×698. y coords use IW as scale (square pixels from centre).
// All shape values derived from cv2.minAreaRect on actual pixel data.
//
// Canvas scale: multiply norm coords by S * SC, offset by (S*OX, S*OY)
// Chosen to fit figure with margin: figure spans x:-0.684..0.862, y:-0.268..0.544
// Centre of figure: x_mid=0.089, y_mid=0.138. Scale to fill ~88% of canvas.
const SC = 0.88 / 1.546;  // 1.546 = total width span
const OX = -0.089 * SC;   // centre figure in canvas
const OY = -0.138 * SC;

function px(nx, ny){
  return [S*0.5 + (nx*SC + OX)*S*0.5, S*0.5 + (ny*SC + OY)*S*0.5];
}
function pxS(n){ return n * SC * S * 0.5; } // scale only (for radii/sizes)

// ── Exact epicycle chains ─────────────────────────────────────────────────────
function circleChain(cx,cy,r){
  const [pcx,pcy]=px(cx,cy), pr=pxS(r);
  return [{dc:true,x:pcx,y:pcy},{freq:1,amp:pr,phase:0}];
}
function lineChain(x1,y1,x2,y2){
  const [mx,my]=px((x1+x2)/2,(y1+y2)/2);
  const [p1x,p1y]=px(x1,y1),[p2x,p2y]=px(x2,y2);
  const hx=(p2x-p1x)/2,hy=(p2y-p1y)/2;
  const amp=Math.sqrt(hx*hx+hy*hy),phi=Math.atan2(hy,hx);
  return [{dc:true,x:mx,y:my},{freq:+1,amp,phase:phi+Math.PI},{freq:-1,amp,phase:phi+Math.PI}];
}
function rCorners(cx,cy,hw,hh,ang){
  return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([lx,ly])=>[
    lx*Math.cos(ang)-ly*Math.sin(ang)+cx,
    lx*Math.sin(ang)+ly*Math.cos(ang)+cy
  ]);
}
function rectEdges(cx,cy,hw,hh,ang,rgb,lw){
  const C=rCorners(cx,cy,hw,hh,ang);
  return [[0,1],[1,2],[2,3],[3,0]].map(([a,b])=>
    ({chain:lineChain(...C[a],...C[b]),tMax:0.5,color:rgb,lw}));
}
function triEdges(pts,rgb,lw){
  return [[0,1],[1,2],[2,0]].map(([a,b])=>
    ({chain:lineChain(...pts[a],...pts[b]),tMax:0.5,color:rgb,lw}));
}
function approxTriPts(cx,cy,hw,hh,ang){
  // From minAreaRect: approximate triangle as right-pointing shape
  // apex = centre + half the long axis, base = two points at -half long axis
  const lx=hw*Math.cos(ang), ly=hw*Math.sin(ang);
  const wx=hh*Math.cos(ang+Math.PI/2), wy=hh*Math.sin(ang+Math.PI/2);
  return [
    [cx+lx,   cy+ly],           // apex
    [cx-lx+wx, cy-ly+wy],       // base top
    [cx-lx-wx, cy-ly-wy],       // base bottom
  ];
}

// ── Shape data from cv2.minAreaRect on actual reference pixel data ─────────────
// All values: cx,cy in normalised coords (÷ IW/2 from image centre)
//             hw,hh = half-width, half-height in same units
//             angle in radians (from cv2 degrees, converted)
const DEG = Math.PI / 180;
const W=[215,230,255], D=[160,195,245];

// Ground line (detected separately)
const GROUND_Y = 0.544;

const STROKES = [
  // HEAD — large circle, far left
  // cv2 minEnclosingCircle: cx=202.5, cy=495.0, r=164.4 on 1280×698 image
  // norm: cx=-0.684, cy=-0.227 (using IW/2=640 as scale for both axes... but cy uses IH)
  // Actual pixel cy=495 → (495-698/2)/(1280/2) = 146/640 = 0.228
  {chain:circleChain(-0.684, 0.228, 0.257), tMax:1, color:W, lw:2.2},

  // LARGE BODY SHAPE — [0] classified as triangle, but it's the big torso shape
  // area=77139, cx=-0.001, cy=0.211, w=0.400, h=1.730, ang=-90°
  // It's actually a large irregular quad — use its minAreaRect as a tall rect
  ...rectEdges(-0.001, 0.211, 0.200, 0.865, -90*DEG, W, 2.4),

  // BIG TILTED RECT — [1] the main back rectangle
  // area=70337, cx=-0.073, cy=-0.114, w=0.729, h=0.326, ang=-24.5°
  ...rectEdges(-0.073, -0.114, 0.364, 0.163, -24.5*DEG, W, 2.2),

  // CIRCLE — [2] knee/mid circle
  // area=29913, cx=0.264, cy=0.014, w=0.317, h=0.231 → r≈0.137
  {chain:circleChain(0.264, 0.014, 0.137), tMax:1, color:D, lw:1.8},

  // FOOT RECT — [3] wide rect far right
  // area=20943, cx=0.487, cy=0.259, w=0.333, h=0.154, ang=-10.7°
  ...rectEdges(0.487, 0.259, 0.167, 0.077, -10.7*DEG, D, 1.4),

  // UPPER CIRCLE — [4] chest/shoulder circle (upper right area)
  // area=19385, cx=0.340, cy=-0.268, r≈0.122
  {chain:circleChain(0.340, -0.268, 0.122), tMax:1, color:W, lw:2.0},

  // ARM RECT — [5] tilted arm rect
  // area=17132, cx=-0.101, cy=0.243, w=0.340, h=0.124, ang=-38°
  ...rectEdges(-0.101, 0.243, 0.170, 0.062, -38.0*DEG, D, 1.6),

  // SMALL RECT — [6] small rect left-centre
  // area=16639, cx=-0.193, cy=0.054, w=0.130, h=0.340, ang=-60.3°
  ...rectEdges(-0.193, 0.054, 0.065, 0.170, -60.3*DEG, D, 1.4),

  // FOOT TRIANGLE — [7]
  // area=7993, cx=0.729, cy=0.270, w=0.259, h=0.148, ang=-90°
  ...triEdges(approxTriPts(0.729, 0.270, 0.130, 0.074, -90*DEG), D, 1.4),

  // SMALL RECT — [8] tiny rect left
  // area=3158, cx=-0.440, cy=0.083, w=0.075, h=0.157, ang=-24.8°
  ...rectEdges(-0.440, 0.083, 0.037, 0.079, -24.8*DEG, D, 1.2),

  // GROUND LINE
  {chain:lineChain(-0.86, GROUND_Y, 0.86, GROUND_Y), tMax:0.5, color:[70,105,160], lw:0.8},
];

// ── Eval ─────────────────────────────────────────────────────────────────────
function evalChain(chain,t){
  let x=0,y=0; const arms=[];
  for(const c of chain){
    let nx,ny;
    if(c.dc){nx=c.x;ny=c.y;}
    else{
      const a=c.freq*TAU*t+(c.phase||0);
      nx=x+c.amp*Math.cos(a); ny=y+c.amp*Math.sin(a);
      if(c.amp>2) arms.push({x0:x,y0:y,x1:nx,y1:ny,r:c.amp});
    }
    x=nx;y=ny;
  }
  return {tip:{x,y},arms};
}
function drawArms(arms){
  for(const a of arms){
    if(a.r<2) continue;
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.7; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.30)'; ctx.lineWidth=0.9; ctx.stroke();
  }
}
function drawTrail(pts,rgb,lw){
  if(pts.length<2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.92)`;
  ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
}

const DRAW_SPEED=0.022, HOLD_FRAMES=120;
let idx=0,t=0,trails=STROKES.map(()=>[]),phase='drawing',holding=0,lastTs=null,paused=false;

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      const tM=STROKES[idx].tMax;
      if(t>=tM){
        t=tM; const{tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip);
        idx++; if(idx>=STROKES.length){phase='holding';holding=0;} else{t=0;trails[idx]=[];}
      } else { const{tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip); }
    } else {
      holding+=dt*60;
      if(holding>HOLD_FRAMES){idx=0;t=0;trails=STROKES.map(()=>[]);phase='drawing';}
    }
  }
  for(let i=0;i<Math.min(idx,STROKES.length);i++)
    if(trails[i].length>1) drawTrail(trails[i],STROKES[i].color,STROKES[i].lw);
  if(phase==='drawing'&&idx<STROKES.length){
    const s=STROKES[idx];
    const{tip,arms}=evalChain(s.chain,t);
    if(trails[idx].length>1) drawTrail(trails[idx],s.color,s.lw);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }
  requestAnimationFrame(tick);
}
window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true;
    STROKES.forEach((s,i)=>{
      trails[i]=[];
      for(let j=0;j<=80;j++){const{tip}=evalChain(s.chain,j/80*s.tMax);trails[i].push(tip);}
    });
    idx=STROKES.length; phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    STROKES.forEach((s,i)=>{if(trails[i].length>1) drawTrail(trails[i],s.color,s.lw);});
  }
};
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
