<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Parametric</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#070710; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const PHI = 1.61803398875;   // golden ratio
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S + 'px';
}
resize(); window.addEventListener('resize', resize);

// ── Define sujud purely through mathematical relationships ────────────────────
// All proportions derived from φ and simple fractions.
// Coordinate space: -1..1, y=-1 top, y=+1 bottom.
// Figure faces left. Ground at y = 1/φ ≈ 0.618.

const GY    = 1 / PHI;          // ground level  ≈  0.618
const ARCH  = 1 / (PHI * PHI);  // arch height   ≈  0.382
const R_HEAD = 1 / (PHI * PHI * PHI);  // head radius ≈ 0.236 * scale
const R_KNEE = R_HEAD * (1/PHI);        // knee radius (smaller)

// Key anatomical landmarks (x, y):
const HEAD  = [-0.72, GY - R_HEAD];      // head centre, resting on ground
const SHLDR = [-0.52, GY - R_HEAD*0.4];  // shoulder, low near head
const APEX  = [-0.02, GY - ARCH - R_HEAD * 0.5]; // posterior peak (highest)
const HIP   = [ 0.28, GY - ARCH * 0.3]; // hip descending
const KNEE  = [ 0.52, GY - R_KNEE];     // knee on ground
const FOOT  = [ 0.72, GY - R_KNEE*0.6]; // feet tucked right

// ── Build parametric closed path ─────────────────────────────────────────────
// Catmull-Rom spline through key points, closing on itself.
// The path traces: head(circle) → neck→back arch → hip → knee(circle) → foot → ground → hands → head

function catmullRom(p0, p1, p2, p3, t) {
  const t2=t*t, t3=t2*t;
  return [
    0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
    0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
  ];
}

function buildPath() {
  const pts = [];

  // 1. Head circle (CCW from back of head)
  const N_HEAD = 40;
  for (let i = 0; i < N_HEAD; i++) {
    const a = Math.PI + (TAU * i / N_HEAD); // start at back, go CCW
    pts.push([HEAD[0] + R_HEAD * Math.cos(a), HEAD[1] + R_HEAD * Math.sin(a)]);
  }

  // 2. Neck + back spine arch (head top → apex)
  // Spine rises from shoulder to apex: use cosine arch
  const N_SPINE = 60;
  for (let i = 0; i <= N_SPINE; i++) {
    const t = i / N_SPINE;
    const x = SHLDR[0] + (APEX[0] - SHLDR[0]) * t;
    // Cosine arch — rises to peak naturally
    const y = SHLDR[1] + (APEX[1] - SHLDR[1]) * t - ARCH * 0.15 * Math.sin(Math.PI * t);
    pts.push([x, y]);
  }

  // 3. Back of thigh from apex to knee
  const N_THIGH = 40;
  const spineKnots = [APEX, HIP, KNEE];
  for (let i = 0; i < N_THIGH; i++) {
    const t = i / N_THIGH;
    const seg = Math.floor(t * (spineKnots.length - 1));
    const tt = t * (spineKnots.length - 1) - seg;
    const p0 = spineKnots[Math.max(0, seg-1)];
    const p1 = spineKnots[seg];
    const p2 = spineKnots[Math.min(spineKnots.length-1, seg+1)];
    const p3 = spineKnots[Math.min(spineKnots.length-1, seg+2)];
    pts.push(catmullRom(p0, p1, p2, p3, tt));
  }

  // 4. Knee circle
  const N_KNEE = 24;
  for (let i = 0; i < N_KNEE; i++) {
    const a = -Math.PI/2 + (TAU * i / N_KNEE);
    pts.push([KNEE[0] + R_KNEE * Math.cos(a), KNEE[1] + R_KNEE * Math.sin(a)]);
  }

  // 5. Shin + foot (knee → foot)
  const N_SHIN = 20;
  for (let i = 1; i <= N_SHIN; i++) {
    const t = i / N_SHIN;
    pts.push([
      KNEE[0] + (FOOT[0] - KNEE[0]) * t,
      KNEE[1] + (FOOT[1] - KNEE[1]) * t + R_KNEE * 0.3 * Math.sin(Math.PI * t)
    ]);
  }

  // 6. Ground line right → left (foot to just before hands)
  const N_GROUND = 50;
  const HAND = [-0.60, GY]; // hands/forearms on ground
  for (let i = 1; i <= N_GROUND; i++) {
    const t = i / N_GROUND;
    pts.push([FOOT[0] + (HAND[0] - FOOT[0]) * t, GY]);
  }

  // 7. Hands + forearms raised slightly (arms flat on ground)
  pts.push([-0.60, GY - 0.04]);
  pts.push([-0.68, GY - 0.03]);
  pts.push([-0.74, GY - 0.01]);
  pts.push([-0.74, GY]);
  pts.push([-0.65, GY]);

  // Close back to head (ground → back of head)
  const N_CLOSE = 20;
  for (let i = 1; i <= N_CLOSE; i++) {
    const t = i / N_CLOSE;
    const hBack = [HEAD[0] - R_HEAD, HEAD[1]];
    pts.push([
      -0.65 + (hBack[0] - (-0.65)) * t,
      GY + (hBack[1] - GY) * t
    ]);
  }

  return pts;
}

// ── Resample to equidistant N points ─────────────────────────────────────────
function resample(pts, N) {
  const closed = [...pts, pts[0]];
  const lens = [0];
  for (let i = 1; i < closed.length; i++) {
    const dx = closed[i][0]-closed[i-1][0], dy = closed[i][1]-closed[i-1][1];
    lens.push(lens[i-1] + Math.sqrt(dx*dx+dy*dy));
  }
  const total = lens[lens.length-1];
  const out = []; let j = 0;
  for (let i = 0; i < N; i++) {
    const tgt = i/N * total;
    while (j < lens.length-1 && lens[j+1] < tgt) j++;
    const t = (tgt-lens[j])/(lens[j+1]-lens[j]+1e-9);
    const a = pts[Math.min(j, pts.length-1)], b = pts[Math.min(j+1, pts.length-1)];
    out.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]);
  }
  return out;
}

// ── Complex FFT ───────────────────────────────────────────────────────────────
function fft(pts) {
  const N = pts.length;
  const z = pts.map(p => [p[0], p[1]]); // [re, im]
  // Simple DFT (N=256, fast enough)
  const Z = [];
  for (let k = 0; k < N; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const phi = TAU * k * n / N;
      re += z[n][0]*Math.cos(phi) - z[n][1]*Math.sin(phi);
      im += z[n][0]*Math.sin(phi) + z[n][1]*Math.cos(phi);
    }
    const freq = k <= N/2 ? k : k-N;
    Z.push({freq, amp: Math.sqrt(re*re+im*im)/N, phase: Math.atan2(im, re)});
  }
  Z.sort((a,b) => b.amp - a.amp);
  return Z.slice(0, 80);
}

// Build the path
const rawPath = buildPath();
const sampled = resample(rawPath, 256);
const FREQS = fft(sampled);

// Canvas scale
const xs = sampled.map(p=>p[0]), ys = sampled.map(p=>p[1]);
const xspan = Math.max(...xs)-Math.min(...xs);
const yspan = Math.max(...ys)-Math.min(...ys);
const SC = 0.85 / Math.max(xspan, yspan);
const OX = -(Math.max(...xs)+Math.min(...xs))/2;
const OY = -(Math.max(...ys)+Math.min(...ys))/2;

function toCanvas(nx, ny) {
  return [S*0.5+(nx+OX)*SC*S, S*0.5+(ny+OY)*SC*S];
}

// ── Epicycle evaluation ───────────────────────────────────────────────────────
function evalEpi(t) {
  let x=0, y=0; const arms=[];
  for (const f of FREQS) {
    const angle = f.freq*TAU*t + f.phase;
    const nx = x + f.amp*Math.cos(angle);
    const ny = y + f.amp*Math.sin(angle);
    const [cx0,cy0]=toCanvas(x,y), [cx1,cy1]=toCanvas(nx,ny);
    const r = f.amp*SC*S;
    if (r > 2) arms.push({x0:cx0,y0:cy0,x1:cx1,y1:cy1,r});
    x=nx; y=ny;
  }
  return {tip: toCanvas(x,y), arms};
}

// Pre-trace ghost
const GHOST=[];
for (let i=0; i<=500; i++) GHOST.push(evalEpi(i/500).tip);

// ── Animation ─────────────────────────────────────────────────────────────────
const TRAIL_LEN = 480;
const trailX = new Float32Array(TRAIL_LEN);
const trailY = new Float32Array(TRAIL_LEN);
let trailHead = 0, trailFull = false;

let time = 0;
const SPEED = 0.00030; // ~55s full revolution
let lastTs = null;

function tick(ts) {
  if (!lastTs) lastTs=ts;
  const dt = Math.min((ts-lastTs)/1000, 0.05); lastTs=ts;
  time += SPEED * 60 * dt;
  if (time > 1) time -= 1;

  ctx.fillStyle='rgba(7,7,16,0.20)';
  ctx.fillRect(0,0,S,S);

  const {tip, arms} = evalEpi(time);

  // Ghost
  ctx.beginPath();
  ctx.moveTo(GHOST[0][0], GHOST[0][1]);
  for (let i=1; i<GHOST.length; i++) ctx.lineTo(GHOST[i][0], GHOST[i][1]);
  ctx.closePath();
  ctx.strokeStyle='rgba(120,160,255,0.07)';
  ctx.lineWidth=1.2; ctx.stroke();

  // Arms + circles
  for (const a of arms) {
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle=`rgba(70,110,200,${Math.min(0.14,1.2/a.r)})`;
    ctx.lineWidth=0.7; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(110,160,255,0.24)';
    ctx.lineWidth=0.8; ctx.stroke();
  }

  // Trail
  trailX[trailHead]=tip[0]; trailY[trailHead]=tip[1];
  trailHead=(trailHead+1)%TRAIL_LEN;
  if(trailHead===0) trailFull=true;
  const len = trailFull ? TRAIL_LEN : trailHead;

  if(len>1){
    for(let i=1;i<len;i++){
      const idx = trailFull?(trailHead+i)%TRAIL_LEN:i;
      const prev = trailFull?(trailHead+i-1)%TRAIL_LEN:i-1;
      const a = i/len;
      ctx.beginPath();
      ctx.moveTo(trailX[prev],trailY[prev]);
      ctx.lineTo(trailX[idx],trailY[idx]);
      ctx.strokeStyle=`rgba(200,222,255,${0.15+a*0.82})`;
      ctx.lineWidth=0.6+a*2.0;
      ctx.stroke();
    }
  }

  // Tip
  ctx.beginPath(); ctx.arc(tip[0],tip[1],3.5,0,TAU);
  ctx.fillStyle='rgba(255,255,255,0.96)'; ctx.fill();
  const g=ctx.createRadialGradient(tip[0],tip[1],0,tip[0],tip[1],14);
  g.addColorStop(0,'rgba(160,200,255,0.5)');
  g.addColorStop(1,'rgba(160,200,255,0)');
  ctx.beginPath(); ctx.arc(tip[0],tip[1],14,0,TAU);
  ctx.fillStyle=g; ctx.fill();

  requestAnimationFrame(tick);
}

window.salah = { pause(){}, forceComplete(){} };
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
