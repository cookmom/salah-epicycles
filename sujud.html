<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Constructivist Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight - 50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S + 'px';
}
resize(); window.addEventListener('resize', resize);

// ── Coordinate system ─────────────────────────────────────────────────────────
// Source: pixel coords from 1280×698 image, normalised as:
//   nx = (px - 640) / 640
//   ny = (py - 349) / 640  (width used for both axes — square pixels from centre)
//
// Figure bounds: x[-0.800..0.878], y[-0.239..0.436]
// Scale to fit canvas with 85% fill: SC = 0.85 / 1.678 ≈ 0.507
// Centre offset: OX=0.039, OY=0.099
const SC = 0.82;
const OX = 0.039, OY = 0.099;

function px(nx, ny){
  return [S*0.5 + (nx-OX)*SC*S*0.5, S*0.5 + (ny-OY)*SC*S*0.5];
}
function pxS(n){ return n * SC * S * 0.5; }

// ── Exact epicycle chains ─────────────────────────────────────────────────────
function circleChain(cx,cy,r){
  const [pcx,pcy]=px(cx,cy), pr=pxS(r);
  return [{dc:true,x:pcx,y:pcy},{freq:1,amp:pr,phase:0}];
}
function lineChain(x1,y1,x2,y2){
  const [mx,my]=px((x1+x2)/2,(y1+y2)/2);
  const [p1x,p1y]=px(x1,y1),[p2x,p2y]=px(x2,y2);
  const hx=(p2x-p1x)/2,hy=(p2y-p1y)/2;
  const amp=Math.sqrt(hx*hx+hy*hy),phi=Math.atan2(hy,hx);
  return [{dc:true,x:mx,y:my},{freq:+1,amp,phase:phi+Math.PI},{freq:-1,amp,phase:phi+Math.PI}];
}
function rCorners(cx,cy,hw,hh,ang){
  return [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([lx,ly])=>[
    lx*Math.cos(ang)-ly*Math.sin(ang)+cx,
    lx*Math.sin(ang)+ly*Math.cos(ang)+cy
  ]);
}
function rectEdges(cx,cy,hw,hh,ang,rgb,lw){
  const C=rCorners(cx,cy,hw,hh,ang);
  return [[0,1],[1,2],[2,3],[3,0]].map(([a,b])=>
    ({chain:lineChain(...C[a],...C[b]),tMax:0.5,color:rgb,lw}));
}
function triEdges(pts,rgb,lw){
  return [[0,1],[1,2],[2,0]].map(([a,b])=>
    ({chain:lineChain(...pts[a],...pts[b]),tMax:0.5,color:rgb,lw}));
}

// ── Normalise pixel coords ────────────────────────────────────────────────────
function n(px){ return (px-640)/640; }
function ny(py){ return (py-349)/640; }

const DEG = Math.PI/180;
const W=[215,230,255], D=[160,195,245], DIM=[100,130,180];

// ── Strokes — drawn back to front, each by epicycle chains ───────────────────
// All data from Claude Code analysis of reference image (1280×698px)

const STROKES = [
  // 1. GROUND LINE  y=628, x:128→1202
  {chain:lineChain(n(128),ny(628), n(1202),ny(628)), tMax:0.5, color:DIM, lw:0.8},

  // 2. HIP CIRCLE  center(233,490) r=132
  {chain:circleChain(n(233),ny(490), 132/640), tMax:1, color:W, lw:2.2},

  // 3. TORSO RECT  center(555,235) 480×285 -5°
  ...rectEdges(n(555),ny(235), 240/640,142/640, -5*DEG, W, 2.4),

  // 4. THIGH STRIP  center(358,458) 68×110 -72°
  ...rectEdges(n(358),ny(458), 34/640,55/640, -72*DEG, D, 1.4),

  // 5. NECK RECT  center(838,302) 128×230 +10°
  ...rectEdges(n(838),ny(302), 64/640,115/640, +10*DEG, W, 2.0),

  // 6. HOLLOW ARM RECT  center(491,363) 220×95 -13° (outline only — lighter)
  ...rectEdges(n(491),ny(363), 110/640,47/640, -13*DEG, D, 1.2),

  // 7. HEAD CIRCLE  center(871,196) r=79
  {chain:circleChain(n(871),ny(196), 79/640), tMax:1, color:W, lw:2.0},

  // 8. FOREARM RECT  center(607,432) 252×88 -18°
  ...rectEdges(n(607),ny(432), 126/640,44/640, -18*DEG, D, 1.6),

  // 9. ANKLE BLOCK  center(413,605) 82×38 0°
  ...rectEdges(n(413),ny(605), 41/640,19/640, 0, D, 1.4),

  // 10. SHIN RECT  center(920,542) 208×93 -9°
  ...rectEdges(n(920),ny(542), 104/640,46/640, -9*DEG, D, 1.6),

  // 11. KNEE CIRCLE  center(720,515) r=68
  {chain:circleChain(n(720),ny(515), 68/640), tMax:1, color:W, lw:1.8},

  // 12. FOOT TRIANGLE  vertices: (1145,480),(1202,492),(1148,625)
  ...triEdges([
    [n(1145),ny(480)],
    [n(1202),ny(492)],
    [n(1148),ny(625)],
  ], D, 1.4),
];

// ── Eval ─────────────────────────────────────────────────────────────────────
function evalChain(chain,t){
  let x=0,y=0; const arms=[];
  for(const c of chain){
    let nx2,ny2;
    if(c.dc){nx2=c.x;ny2=c.y;}
    else{
      const a=c.freq*TAU*t+(c.phase||0);
      nx2=x+c.amp*Math.cos(a); ny2=y+c.amp*Math.sin(a);
      if(c.amp>2) arms.push({x0:x,y0:y,x1:nx2,y1:ny2,r:c.amp});
    }
    x=nx2;y=ny2;
  }
  return {tip:{x,y},arms};
}
function drawArms(arms){
  for(const a of arms){
    if(a.r<2) continue;
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.7; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.30)'; ctx.lineWidth=0.9; ctx.stroke();
  }
}
function drawTrail(pts,rgb,lw){
  if(pts.length<2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.92)`;
  ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
}

const DRAW_SPEED=0.022, HOLD_FRAMES=120;
let idx=0,t=0,trails=STROKES.map(()=>[]),phase='drawing',holding=0,lastTs=null,paused=false;

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      const tM=STROKES[idx].tMax;
      if(t>=tM){
        t=tM; const{tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip);
        idx++; if(idx>=STROKES.length){phase='holding';holding=0;} else{t=0;trails[idx]=[];}
      } else { const{tip}=evalChain(STROKES[idx].chain,t); trails[idx].push(tip); }
    } else {
      holding+=dt*60;
      if(holding>HOLD_FRAMES){idx=0;t=0;trails=STROKES.map(()=>[]);phase='drawing';}
    }
  }
  for(let i=0;i<Math.min(idx,STROKES.length);i++)
    if(trails[i].length>1) drawTrail(trails[i],STROKES[i].color,STROKES[i].lw);
  if(phase==='drawing'&&idx<STROKES.length){
    const s=STROKES[idx];
    const{tip,arms}=evalChain(s.chain,t);
    if(trails[idx].length>1) drawTrail(trails[idx],s.color,s.lw);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }
  requestAnimationFrame(tick);
}
window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true;
    STROKES.forEach((s,i)=>{
      trails[i]=[];
      for(let j=0;j<=80;j++){const{tip}=evalChain(s.chain,j/80*s.tMax);trails[i].push(tip);}
    });
    idx=STROKES.length; phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    STROKES.forEach((s,i)=>{if(trails[i].length>1) drawTrail(trails[i],s.color,s.lw);});
  }
};
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
