<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujud — Epicycles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; }
canvas { display:block; }
#lbl { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-family:Georgia,serif; color:rgba(200,220,255,0.38); font-size:11px; letter-spacing:.26em; text-transform:uppercase; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">سجود &nbsp;·&nbsp; Sujud</div>
<script>
(function(){
'use strict';
const TAU = Math.PI * 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let S;
function resize(){
  S = Math.min(window.innerWidth, window.innerHeight-50, 720);
  canvas.width = canvas.height = S;
  canvas.style.width = canvas.style.height = S+'px';
}
resize(); window.addEventListener('resize', resize);

// ── Precomputed DFT frequencies ────────────────────────────────────────────────
// Source: cv2 outer contour of merged sujud silhouette (1280×698 reference image)
// 256 equidistant points → DFT → top 80 frequencies by amplitude
// Coordinates normalised: image centre = (0,0), scale = IW/2 = 640px
// 256 silhouette points → DFT → top 80 frequencies
const FREQS = [
  {freq:1,amp:0.61551,phase:-1.50864},
  {freq:-1,amp:0.17054,phase:1.48463},
  {freq:0,amp:0.12695,phase:1.28487},
  {freq:-2,amp:0.10536,phase:-1.36024},
  {freq:4,amp:0.05949,phase:-1.80170},
  {freq:2,amp:0.05351,phase:0.42247},
  {freq:-3,amp:0.02327,phase:-0.21302},
  {freq:-4,amp:0.02022,phase:0.57825},
  {freq:3,amp:0.02018,phase:0.16354},
  {freq:5,amp:0.01914,phase:-2.64087},
  {freq:6,amp:0.01639,phase:1.95992},
  {freq:-6,amp:0.01469,phase:2.14173},
  {freq:-8,amp:0.01200,phase:-1.51727},
  {freq:-7,amp:0.00584,phase:-2.83372},
  {freq:-10,amp:0.00502,phase:1.80239},
  {freq:-5,amp:0.00465,phase:0.71192},
  {freq:11,amp:0.00390,phase:0.97652},
  {freq:10,amp:0.00289,phase:-1.03416},
  {freq:7,amp:0.00287,phase:2.59187},
  {freq:12,amp:0.00276,phase:1.62652},
  {freq:16,amp:0.00215,phase:-1.69781},
  {freq:8,amp:0.00214,phase:3.14139},
  {freq:-14,amp:0.00210,phase:-1.97418},
  {freq:13,amp:0.00206,phase:-2.19856},
  {freq:-11,amp:0.00175,phase:-1.10290},
  {freq:15,amp:0.00163,phase:-0.17887},
  {freq:18,amp:0.00148,phase:1.32934},
  {freq:-16,amp:0.00129,phase:1.48914},
  {freq:-15,amp:0.00122,phase:-1.65411},
  {freq:-13,amp:0.00118,phase:2.56839},
  {freq:14,amp:0.00118,phase:-0.22778},
  {freq:9,amp:0.00104,phase:-2.26009},
  {freq:-12,amp:0.00096,phase:-0.91086},
  {freq:-19,amp:0.00090,phase:-1.92623},
  {freq:-9,amp:0.00090,phase:1.70023},
  {freq:20,amp:0.00087,phase:-1.86294},
  {freq:-17,amp:0.00082,phase:1.40445},
  {freq:19,amp:0.00070,phase:-1.84478},
  {freq:-18,amp:0.00065,phase:-1.73701},
  {freq:-20,amp:0.00048,phase:-1.70988},
  {freq:17,amp:0.00035,phase:2.54803},
  {freq:21,amp:0.00032,phase:0.96200},
  {freq:23,amp:0.00029,phase:-1.18432},
  {freq:-22,amp:0.00028,phase:1.25851},
  {freq:-25,amp:0.00021,phase:-1.38659},
  {freq:25,amp:0.00020,phase:-2.90794},
  {freq:26,amp:0.00020,phase:-2.31783},
  {freq:-21,amp:0.00019,phase:-0.23489},
  {freq:-24,amp:0.00017,phase:-1.17569},
  {freq:-23,amp:0.00015,phase:1.59866},
  {freq:22,amp:0.00015,phase:-0.50483},
  {freq:24,amp:0.00011,phase:0.76270},
  {freq:27,amp:0.00011,phase:-0.13105},
  {freq:29,amp:0.00010,phase:-2.69751},
  {freq:-26,amp:0.00008,phase:-2.51267},
  {freq:30,amp:0.00007,phase:1.29242},
  {freq:32,amp:0.00006,phase:-2.11740},
  {freq:-28,amp:0.00006,phase:0.01764},
  {freq:28,amp:0.00005,phase:-1.37559},
  {freq:-31,amp:0.00005,phase:-1.03734},
];

// ── Coordinate mapping ────────────────────────────────────────────────────────
// Figure spans x:-0.903..0.902, y:-0.450..0.448 in normalised space
// Scale to fill 88% of canvas
const SC = 0.88 / 1.782;  // x span

function toCanvas(nx, ny){
  return [S*0.5 + nx*SC*S, S*0.5 + ny*SC*S];
}

// ── Epicycle evaluation ───────────────────────────────────────────────────────
function evalEpicycles(t) {
  let x=0, y=0;
  const arms=[];
  for(const f of FREQS){
    const angle = f.freq * TAU * t + f.phase;
    const nx = x + f.amp * Math.cos(angle);
    const ny = y + f.amp * Math.sin(angle);
    const [cx0,cy0] = toCanvas(x,y);
    const [cx1,cy1] = toCanvas(nx,ny);
    const r = f.amp * SC * S;
    if(r > 2) arms.push({x0:cx0,y0:cy0,x1:cx1,y1:cy1,r});
    x=nx; y=ny;
  }
  const [tipX,tipY] = toCanvas(x,y);
  return {tip:{x:tipX,y:tipY}, arms};
}

// ── Animation ─────────────────────────────────────────────────────────────────
const DRAW_SPEED = 0.0028;
const HOLD_MS    = 2500;

let t=0, trail=[], phase='drawing', holdMs=0, lastTs=null, paused=false;

function drawArms(arms){
  for(const a of arms){
    ctx.beginPath(); ctx.arc(a.x0,a.y0,a.r,0,TAU);
    ctx.strokeStyle='rgba(120,175,255,0.09)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(a.x0,a.y0); ctx.lineTo(a.x1,a.y1);
    ctx.strokeStyle='rgba(140,190,255,0.32)'; ctx.lineWidth=1.0; ctx.stroke();
  }
}

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);

  if(!paused){
    if(phase==='drawing'){
      t+=DRAW_SPEED*60*dt;
      if(t>=1){ t=1; phase='holding'; holdMs=0; }
      const{tip}=evalEpicycles(t); trail.push({...tip});
    } else {
      holdMs+=dt*1000;
      if(holdMs>HOLD_MS){ t=0; trail=[]; phase='drawing'; }
    }
  }

  // Trail
  if(trail.length>1){
    ctx.beginPath(); ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
    if(phase==='holding') ctx.closePath();
    ctx.strokeStyle=phase==='holding'?'rgba(220,235,255,0.96)':'rgba(200,222,255,0.88)';
    ctx.lineWidth=phase==='holding'?1.8:1.4;
    ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  }

  // Arms (drawing only)
  if(phase==='drawing'){
    const{tip,arms}=evalEpicycles(t);
    drawArms(arms);
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3.5,0,TAU);
    ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.fill();
  }

  requestAnimationFrame(tick);
}

window.salah={
  pause(){paused=true;},
  resume(){paused=false;},
  forceComplete(){
    paused=true; t=1; trail=[];
    const N=500;
    for(let i=0;i<=N;i++){const{tip}=evalEpicycles(i/N);trail.push({...tip});}
    phase='holding';
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    ctx.beginPath(); ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
    ctx.closePath();
    ctx.strokeStyle='rgba(220,235,255,0.96)'; ctx.lineWidth=1.8;
    ctx.lineJoin='round'; ctx.stroke();
  }
};

requestAnimationFrame(tick);
})();
</script>
</body>
</html>
